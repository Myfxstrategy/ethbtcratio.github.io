            title: "🔄 Module 8: Divergence - The Trap Detector",
            content: `
                <div class="lecture-content">
                    <p>Divergence helps you <span class="highlight">avoid trap signals</span> and fake moves.</p>
                    
                    <div class="critical-box">
                        <strong>🔥 BEARISH DIVERGENCE:</strong>
                        <p>Z-Score > +1.5 (price high) BUT RSI ratio &lt; 50</p>
                        <p>→ Price high, but momentum failing</p>
                        <p>→ <span class="danger-text">Avoid chasing ETH</span></p>
                    </div>
                    
                    <div class="critical-box">
                        <strong>🔥 BULLISH DIVERGENCE:</strong>
                        <p>Z-Score < -1.5 (price low) BUT RSI ratio > 50</p>
                        <p>→ Price low, but momentum improving</p>
                        <p>→ <span class="success-text">High quality entry signal</span></p>
                    </div>
                    
                    <div class="example-box">
                        <div class="example-title">📊 DASHBOARD VISUAL</div>
                        <p>When divergence is detected, the dashboard shows a <span class="warning-text">🟠 orange warning box</span> with explanation.</p>
                    </div>
                </div>
            `
        },
        // Quiz 2
        {
            type: "quiz",
            title: "📝 Quiz 2: Plan B & Divergence",
            quizBank: true,
            numQuestions: 5
        },
        // Module 9
        {
            type: "lecture",
            title: "📋 Module 9: Daily Trading Routine",
            content: `
                <div class="lecture-content">
                    <p>Follow this <span class="highlight">simple 5-step process</span> every day:</p>
                    
                    <ul>
                        <li><span class="highlight">🕐 STEP 1 (5 min)</span> - Open dashboard, check main 1H Z-Score</li>
                        <li><span class="highlight">🕐 STEP 2 (10 min)</span> - Is Z < -1.5 or > +1.5? If yes, check RSI and EMA50</li>
                        <li><span class="highlight">🕐 STEP 3 (5 min)</span> - Check divergence alert (no orange box = good)</li>
                        <li><span class="highlight">🕐 STEP 4 (5 min)</span> - If all 3 conditions met → execute trade with 1-2% risk</li>
                        <li><span class="highlight">🕐 STEP 5 (5 min)</span> - Set alert for Z = 0 (exit)</li>
                    </ul>
                    
                    <div class="tip-box">
                        <strong>⏰ SUGGESTED SCHEDULE:</strong>
                        <p>• 08:00 GMT - Morning check (15 min)</p>
                        <p>• 12:00 GMT - Mid-day check (5 min)</p>
                        <p>• 16:00 GMT - End of day review (10 min)</p>
                        <p>• <span class="highlight">Total: ~30 minutes per day</span></p>
                    </div>
                </div>
            `
        },
        // Module 10
        {
            type: "lecture",
            title: "⚠️ Module 10: Common Mistakes",
            content: `
                <div class="lecture-content">
                    <p>Here are the <span class="danger-text">most common mistakes</span> to avoid:</p>
                    
                    <ul>
                        <li><span class="danger-text">❌ Entering when Z-Score is NOT extreme</span> → No statistical edge</li>
                        <li><span class="danger-text">❌ Trading against the EMA50 trend</span> → High failure rate</li>
                        <li><span class="danger-text">❌ Risking more than 2% per trade</span> → One loss hurts</li>
                        <li><span class="danger-text">❌ Holding past exit signal</span> → Winners become losers</li>
                        <li><span class="danger-text">❌ Confusing Plan B with main system</span> → Keep separate</li>
                        <li><span class="danger-text">❌ Ignoring divergence warnings</span> → Divergence catches traps</li>
                        <li><span class="danger-text">❌ Trading on the wrong timeframe</span> → Use 1H for main signals</li>
                    </ul>
                    
                    <div class="important-box">
                        <strong>💡 THE #1 RULE:</strong>
                        <p><span class="success-text">No signal = No trade.</span> Forcing trades with no edge = LOSING MONEY.</p>
                        <p>Sometimes the best trade is NO TRADE.</p>
                    </div>
                </div>
            `
        },
        // Final Quiz
        {
            type: "quiz",
            title: "🎓 FINAL EXAM: Complete Strategy Mastery",
            quizBank: true,
            numQuestions: 10
        },
        // Completion
        {
            type: "completion",
            title: "🎉 Congratulations!"
        }
    ];

    let currentModule = 0;
    let quizAnswers = {};
    let currentQuizQuestions = [];

    const progressBar = document.getElementById('progressBar');
    const stepIndicator = document.getElementById('stepIndicator');
    const stepContainer = document.getElementById('stepContainer');

    function getRandomQuestions(count) {
        const shuffled = [...quizBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function updateProgress() {
        const total = modules.length;
        const progress = ((currentModule + 1) / total) * 100;
        progressBar.style.width = `${progress}%`;
        stepIndicator.innerHTML = `Lesson ${currentModule + 1} / ${total}`;
    }

    function renderModule() {
        const module = modules[currentModule];
        updateProgress();

        let html = '';

        if (module.type === 'lecture') {
            html = `
                <div class="lecture-card">
                    <div class="card-title">${module.title}</div>
                    ${module.content}
                    <div class="button-group">
                        ${currentModule > 0 ? `<button class="btn btn-secondary" onclick="previousModule()">◀ Previous</button>` : '<div></div>'}
                        <button class="btn btn-primary" onclick="nextModule()">Next Lesson ▶</button>
                    </div>
                </div>
            `;
        }
        else if (module.type === 'quiz') {
            if (!currentQuizQuestions[currentModule]) {
                currentQuizQuestions[currentModule] = getRandomQuestions(module.numQuestions || 5);
                quizAnswers[currentModule] = {};
            }
            
            const questions = currentQuizQuestions[currentModule];
            const userAnswers = quizAnswers[currentModule] || {};
            let allCorrect = true;
            let answeredCount = 0;
            
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== undefined) {
                    answeredCount++;
                    if (userAnswers[i] !== questions[i].correct) allCorrect = false;
                } else {
                    allCorrect = false;
                }
            }
            
            html = `
                <div class="quiz-card">
                    <div class="card-title">${module.title}</div>
                    <div class="lecture-content">
                        <p style="margin-bottom: 15px;"><span class="highlight">${questions.length} Questions</span> | Answered: ${answeredCount}/${questions.length}</p>
                        ${questions.map((q, idx) => `
                            <div style="margin-bottom: 25px; padding: 15px; background: #1a1a2e; border-radius: 10px;">
                                <p style="font-weight: bold; margin-bottom: 10px;">${idx+1}. ${q.question}</p>
                                ${q.options.map((opt, optIdx) => `
                                    <div class="quiz-option ${userAnswers[idx] === optIdx ? (userAnswers[idx] === q.correct ? 'correct' : 'wrong') : ''}" onclick="selectQuizAnswer(${idx}, ${optIdx})">
                                        ${String.fromCharCode(65+optIdx)}. ${opt}
                                    </div>
                                `).join('')}
                                ${userAnswers[idx] !== undefined ? `
                                    <div class="quiz-feedback ${userAnswers[idx] === q.correct ? 'feedback-correct' : 'feedback-wrong'}">
                                        ${userAnswers[idx] === q.correct ? '✅ Correct! ' + q.explanation : '❌ Incorrect. ' + q.explanation}
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="button-group">
                        ${currentModule > 0 ? `<button class="btn btn-secondary" onclick="previousModule()">◀ Previous</button>` : '<div></div>'}
                        <button class="btn btn-primary" onclick="nextModule()" ${!allCorrect ? 'disabled' : ''}>
                            ${currentModule === modules.length - 1 ? '🎓 Complete Course' : 'Next Lesson ▶'}
                        </button>
                    </div>
                </div>
            `;
        }
        else if (module.type === 'completion') {
            localStorage.setItem('mprimo_academy_completed', 'true');
            localStorage.setItem('mprimo_academy_date', new Date().toISOString());
            
            html = `
                <div class="lecture-card access-screen">
                    <div class="card-title">🎉 CONGRATULATIONS! 🎉</div>
                    <div class="lecture-content">
                        <h2 style="color: #00ff88;">You are now a CERTIFIED Rotator Trader</h2>
                        <p>You've successfully completed all ${modules.length - 1} modules of the Mprimo Trading Academy.</p>
                        <p>You now understand:</p>
                        <ul style="text-align: left; max-width: 450px; margin: 20px auto;">
                            <li>✓ Z-Score mean reversion (statistical edge)</li>
                            <li>✓ RSI confirmation zones (30-45 / 55-70)</li>
                            <li>✓ EMA50 trend filter</li>
                            <li>✓ 4 Timeframes (15m, 1H, 4H, 1D)</li>
                            <li>✓ Exit rules (Z=0, stop loss, divergence)</li>
                            <li>✓ Plan B (Micro Mean Reversion scalping)</li>
                            <li>✓ Divergence detection (trap signals)</li>
                            <li>✓ Daily routine (30 min/day)</li>
                            <li>✓ Risk management (1-2% per trade)</li>
                        </ul>
                        <p><span class="success-text">You are now ready to use the ETH/BTC Rotator Dashboard!</span></p>
                        <button class="purchase-btn" onclick="window.open('https://wa.me/447492166072', '_blank')">💎 PURCHASE FULL DASHBOARD - $97 💎</button>
                        <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">Contact us via WhatsApp to purchase and get instant access to the live trading dashboard.</p>
                        <p style="margin-top: 15px;">📧 <span class="highlight">Instructor:</span> Mohamoud | 📱 WhatsApp: <span class="success-text">+447492166072</span> | 📧 Email: <span class="success-text">ukdesigner62@gmail.com</span></p>
                    </div>
                </div>
            `;
        }

        stepContainer.innerHTML = html;
    }

    function selectQuizAnswer(questionIdx, answerIdx) {
        if (!quizAnswers[currentModule]) quizAnswers[currentModule] = {};
        quizAnswers[currentModule][questionIdx] = answerIdx;
        renderModule();
    }

    function nextModule() {
        if (currentModule < modules.length - 1) {
            currentModule++;
            renderModule();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function previousModule() {
        if (currentModule > 0) {
            currentModule--;
            renderModule();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    const completed = localStorage.getItem('mprimo_academy_completed');
    if (completed === 'true') {
        const completionDate = new Date(localStorage.getItem('mprimo_academy_date'));
        const daysSince = (new Date() - completionDate) / (1000 * 60 * 60 * 24);
        if (daysSince < 90) {
            currentModule = modules.length - 1;
            renderModule();
        } else {
            localStorage.removeItem('mprimo_academy_completed');
            renderModule();
        }
    } else {
        renderModule();
    }
</script>
</body>
</html>
