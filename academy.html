    let currentModule = 0;

    const progressBar = document.getElementById('progressBar');
    const stepIndicator = document.getElementById('stepIndicator');
    const stepContainer = document.getElementById('stepContainer');

    function getRandomQuestions(count) {
        const shuffled = [...quizBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

        const progress = ((currentModule + 1) / total) * 100;

        const module = modules[currentModule];

            html = `

        else if (module.type === 'quiz') {

                currentQuizQuestions[currentModule] = getRandomQuestions(module.numQuestions || 5);
                quizAnswers[currentModule] = {};

            const questions = currentQuizQuestions[currentModule];

            let answeredCount = 0;

                    answeredCount++;
                    if (userAnswers[i] !== questions[i].correct) allCorrect = false;

                    allCorrect = false;
                }

            html = `
                <div class="quiz-card">
                    <div class="card-title">${module.title}</div>

                                    <div class="quiz-option ${userAnswers[idx] === optIdx ? (userAnswers[idx] === q.correct ? 'correct' : 'wrong') : ''}" onclick="selectQuizAnswer(${idx}, ${optIdx})">

                                    </div>
                                `).join('')}

                                    <div class="quiz-feedback ${userAnswers[idx] === q.correct ? 'feedback-correct' : 'feedback-wrong'}">
                                        ${userAnswers[idx] === q.correct ? '✅ Correct! ' + q.explanation : '❌ Incorrect. ' + q.explanation}
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="button-group">
                        ${currentModule > 0 ? `<button class="btn btn-secondary" onclick="previousModule()">◀ Previous</button>` : '<div></div>'}

                    </div>
                </div>

        if (currentModule < modules.length - 1) {

            renderModule();
            window.scrollTo({ top: 0, behavior: 'smooth' });

        if (currentModule > 0) {
            currentModule--;
