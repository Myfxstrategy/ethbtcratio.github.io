<html lang="en">
<head>
    <meta charset="UTF-8">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .academy-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            border: 1px solid #FFD700;
        }

        .academy-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #FFD700, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .academy-header p {
            color: #888;
            font-size: 0.9rem;
        }

        /* Progress Bar */
        .progress-container {
            background: #2a2a3e;
            border-radius: 20px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #FFD700, #00ff88);
            width: 0%;
            height: 100%;
            transition: width 0.5s ease;
        }

        .step-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #FFD700;
        }

        /* Cards */
        .lecture-card, .quiz-card, .daily-card, .terms-card {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.8rem;
            color: #FFD700;
            margin-bottom: 20px;
            border-left: 4px solid #FFD700;
            padding-left: 15px;
        }

        .lecture-content {
            line-height: 1.7;
            color: #ddd;
        }

        .lecture-content p {
            margin-bottom: 15px;
        }

        .lecture-content ul, .lecture-content ol {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .lecture-content li {
            margin-bottom: 8px;
        }

        .highlight {
            color: #FFD700;
            font-weight: bold;
        }

        .success-text {
            color: #00ff88;
            font-weight: bold;
        }

        .warning-text {
            color: #ff8800;
        }

        .danger-text {
            color: #ff4444;
        }

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .routine-card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #FFD700;
        }

        .routine-time {
            font-size: 1.2rem;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .routine-task {
            font-size: 0.9rem;
            color: #ccc;
        }

            background: #2a2a3e;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            background: #3a3a4e;
            border-color: #FFD700;
            transform: translateX(5px);
        }

        .quiz-option.selected {
            background: rgba(255,215,0,0.2);
            border-color: #FFD700;
        }

        .quiz-option.correct {
            background: rgba(0,255,136,0.2);
            border-color: #00ff88;
        }

        .quiz-option.wrong {
            background: rgba(255,68,68,0.2);
            border-color: #ff4444;
        }

        .quiz-feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .feedback-correct {
            background: rgba(0,255,136,0.1);
            border-left: 3px solid #00ff88;
            color: #00ff88;
        }

        .feedback-wrong {
            background: rgba(255,68,68,0.1);
            border-left: 3px solid #ff4444;
            color: #ff8888;
        }

        /* Buttons */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: #FFD700;
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .btn-secondary {
            background: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }

        .btn-contact {
            background: #00aa44;
            color: white;
            border: none;
        }

        .btn-contact:hover {
            background: #008833;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #333;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .contact-label {
            color: #888;
        }

        .contact-value {
            color: #FFD700;
        }

        /* Access Screen */

            text-align: center;
        }

        .access-screen h2 {
            font-size: 2rem;
            color: #00ff88;
            margin-bottom: 20px;
        }

        .dashboard-link {
            display: inline-block;
            background: #FFD700;
            color: #000;
            padding: 15px 40px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .dashboard-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .countdown {
            font-size: 1rem;
            color: #FFD700;
            margin-top: 15px;
        }

        .floating-alert {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #FFD700;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }

        .badge-required {
            background: #ff4444;
            color: white;
        }

        .example-box {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-left: 3px solid #00ff88;
        }

        .example-title {
            color: #00ff88;

        }

        .whatsapp-link {
            color: #00ff88;
            text-decoration: none;
        }

        .whatsapp-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

                    <div class="card-title">${module.title}</div>
                    <div class="lecture-content">
                        <p style="font-size: 1.2rem; margin-bottom: 20px;">❓ ${module.question}</p>
                        ${module.options.map((opt, idx) => `
                            <div class="quiz-option ${selected === idx ? (isCorrect ? 'correct' : 'wrong') : ''}" onclick="selectAnswer(${idx})">
                                ${String.fromCharCode(65+idx)}. ${opt}
                            </div>
                        `).join('')}
                        ${showFeedback ? `
                            <div class="quiz-feedback ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
                                ${isCorrect ? '✅ Correct! ' + module.explanation : '❌ Incorrect. ' + module.explanation}
                            </div>
                        ` : ''}
                    </div>
                    <div class="button-group">
                        ${currentModule > 0 ? `<button class="btn btn-secondary" onclick="previousModule()">◀ Previous</button>` : '<div></div>'}
                        <button class="btn btn-primary" onclick="nextModule()" ${!isCorrect && selected !== undefined ? 'disabled' : ''}>
                            Next Module ▶
                        </button>
                        <button class="btn btn-contact" onclick="window.open('https://wa.me/447492166072', '_blank')">💬 Need Help? WhatsApp</button>
                    </div>
                </div>
            `;
        }
        else if (module.type === 'completion') {
            html = `
                <div class="lecture-card access-screen">
                    <div class="card-title">🎉 CONGRATULATIONS! 🎉</div>
                    <div class="lecture-content">
                        <h2 style="color: #00ff88;">You are now a CERTIFIED TRIO Trader</h2>
                        <p>You've successfully completed all ${modules.length - 1} modules of the Mprimo Online Academy.</p>
                        <p>You now understand:</p>
                        <ul style="text-align: left; max-width: 400px; margin: 20px auto;">
                            <li>✓ Z-Score mean reversion</li>
                            <li>✓ RSI confirmation zones (30-45 / 55-70)</li>
                            <li>✓ EMA50 trend filter</li>
                            <li>✓ Exit rules (Z=0, 2 red candles, 3% drawdown)</li>
                            <li>✓ Daily trading routine</li>
                            <li>✓ Risk management (1-2% per trade)</li>
                        </ul>
                        <p><span class="success-text">You are now ready to use the Mprimo Trading Dashboard!</span></p>
                        <a href="https://myfxstrategy.github.io/ethbtcratio.github.io/" class="dashboard-link" id="dashboardLink">🚀 ACCESS TRADING DASHBOARD 🚀</a>
                        <div class="countdown" id="countdown"></div>
                        <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">⚠️ Remember: Always use proper risk management. Never risk more than 2% per trade.</p>
                        <p style="margin-top: 15px;">📧 <span class="highlight">Instructor:</span> Mohamoud | 📱 WhatsApp: <span class="success-text">+447492166072</span> | 📧 Email: <span class="success-text">ukdesigner62@gmail.com</span></p>
                    </div>
                </div>
            `;
            
            // Auto-redirect after completion
            setTimeout(() => {
                const countdownElem = document.getElementById('countdown');
                if (countdownElem) {
                    let seconds = 5;
                    const interval = setInterval(() => {
                        seconds--;
                        if (countdownElem) countdownElem.innerHTML = `Redirecting in ${seconds} seconds...`;
                        if (seconds <= 0) {
                            clearInterval(interval);
                            window.location.href = "https://myfxstrategy.github.io/ethbtcratio.github.io/";
                        }
                    }, 1000);
                }
            }, 500);
        }

        stepContainer.innerHTML = html;
    }

    function selectAnswer(answerIndex) {
        quizAnswers[currentModule] = answerIndex;
        renderModule();
    }

    function nextModule() {
        if (currentModule < modules.length - 1) {
            currentModule++;
            renderModule();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function previousModule() {
        if (currentModule > 0) {
            currentModule--;
            renderModule();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // Check if already completed
    const completed = localStorage.getItem('mprimo_academy_completed');
    if (completed === 'true') {
        const completionDate = new Date(localStorage.getItem('mprimo_academy_date'));
        const daysSince = (new Date() - completionDate) / (1000 * 60 * 60 * 24);
        if (daysSince < 90) {
            // Redirect directly to dashboard
            window.location.href = "https://myfxstrategy.github.io/ethbtcratio.github.io/";
        } else {
            localStorage.removeItem('mprimo_academy_completed');
            renderModule();
        }
    } else {
        renderModule();
    }
</script>
</body>
</html>
